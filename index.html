const CONFS = [...new Set(DATA.map(r => r.conf).filter(Boolean))].sort();
const sel = document.getElementById('conf-filter');
CONFS.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });

let sortCol = null, sortAsc = true;

function badge(src) {
  if (!src || src === 'Unknown') return '<span class="badge badge-unknown">Unknown</span>';
  if (src.includes('Confirmed')) return '<span class="badge badge-confirmed">Confirmed</span>';
  if (src === 'Estimated') return '<span class="badge badge-estimated">Estimated</span>';
  return '<span class="badge badge-unverified">Unverified</span>';
}

function fmt(v) {
  if (!v) return '<span style="color:#555">—</span>';
  return '<span class="salary">$' + Number(v).toLocaleString() + '</span>';
}

function render() {
  const conf = document.getElementById('conf-filter').value;
  const qual = document.getElementById('qual-filter').value;
  const q = document.getElementById('search').value.toLowerCase();

  let rows = DATA.filter(r =>
    (!conf || r.conf === conf) &&
    (!qual || (r.sal_src || '').includes(qual)) &&
    (!q || r.school.toLowerCase().includes(q) || (r.coach || '').toLowerCase().includes(q))
  );

  if (sortCol) {
    rows.sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (typeof av === 'number' && typeof bv === 'number') return sortAsc ? av - bv : bv - av;
      av = String(av || '').toLowerCase(); bv = String(bv || '').toLowerCase();
      return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }

  document.getElementById('tbody').innerHTML = rows.map(r => `
    <tr>
      <td><strong>${r.school}</strong></td>
      <td style="color:#888;font-size:12px">${r.conf}</td>
      <td>${r.coach || '<span style="color:#555">Unknown</span>'}</td>
      <td>${fmt(r.salary)}</td>
      <td>${badge(r.sal_src)}</td>
      <td style="text-align:center">${r.total_paid || '—'}</td>
      <td style="font-size:12px;color:#888">${r.title || ''}</td>
    </tr>
  `).join('');

  document.getElementById('count').textContent = rows.length + ' programs';
  document.getElementById('s-total').textContent = rows.length;

  const confirmed = rows.filter(r => r.sal_src && r.sal_src.includes('Confirmed'));
  const salaries = confirmed.map(r => r.salary).filter(Boolean);
  document.getElementById('s-conf').textContent = salaries.length;
  document.getElementById('s-avg').textContent = salaries.length ? '$' + Math.round(salaries.reduce((a,b)=>a+b,0)/salaries.length).toLocaleString() : '—';
  document.getElementById('s-max').textContent = salaries.length ? '$' + Math.max(...salaries).toLocaleString() : '—';
}

function sort(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
  render();
}

document.getElementById('conf-filter').addEventListener('change', render);
document.getElementById('qual-filter').addEventListener('change', render);
document.getElementById('search').addEventListener('input', render);
render();
</script>
